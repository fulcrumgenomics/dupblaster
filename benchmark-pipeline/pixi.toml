[workspace]
name = "dupblaster-bench"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
description = "Benchmarking pipeline for dupblaster and peer duplicate-marking tools"

[dependencies]
python = ">=3.11"
snakemake-minimal = ">=8.0"
samtools = ">=1.20"
samblaster = "*"
# GNU time. macOS doesn't ship one; the conda-forge `time` package provides
# it as `time` on PATH in this env.
time = "*"
curl = "*"
# aria2 saturates a fat home/cloud pipe much better than single-stream curl
# from EBI/S3 — typical 4-8x speedup with -x 8 -s 8.
aria2 = "*"
dupsifter = ">=1.3.0.20241113,<2"
openjdk = ">=17,<22"
